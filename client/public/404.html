<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Black APL</title>
    <script>
        // GitHub Pages SPA redirect
        // This script redirects all 404s to index.html with the original path preserved
        const path = window.location.pathname.replace(/\/$/, '');
        if (path && !path.includes('.')) {
            sessionStorage.redirect = path;
            window.location.href = '/mrblackapl/';
        }
    </script>
</head>

</html>
